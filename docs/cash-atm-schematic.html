<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C.A.S.H. Thesis Schematic Diagram</title>
  <style>
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: #f4f7fb; color: #1f2937; }
    .wrap { max-width: 1400px; margin: 20px auto; padding: 0 16px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0 0 14px; color: #4b5563; }
    .panel { background: #fff; border: 1px solid #dbe3ef; border-radius: 12px; padding: 12px; overflow: auto; }
    .note { margin-top: 10px; font-size: 13px; color: #475569; }
    svg { min-width: 1280px; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 10; ry: 10; }
    .group { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.2; rx: 12; ry: 12; }
    .ctrl { fill: #e0f2fe; }
    .disp { fill: #fff7ed; }
    .sensor { fill: #ecfeff; }
    .act { fill: #ecfdf5; }
    .soft { fill: #eef2ff; }
    .power { fill: #fef3c7; }
    .gnd { fill: #fee2e2; }
    .title { font-size: 14px; font-weight: 700; fill: #0f172a; }
    .label { font-size: 12px; fill: #0f172a; }
    .small { font-size: 11px; fill: #334155; }
    .line { stroke: #1f2937; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    .line2 { stroke: #1f2937; stroke-width: 1.6; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
    .gline { stroke: #b91c1c; stroke-width: 1.2; fill: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>C.A.S.H. Thesis Project - System Schematic</h1>
    <p>Offline component diagram for your thesis project (no internet required).</p>
    <div class="panel">
      <svg viewBox="0 0 1400 860" aria-label="CASH thesis schematic">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"></polygon>
          </marker>
        </defs>

        <rect x="20" y="20" width="410" height="190" class="group"></rect>
        <text x="35" y="44" class="title">Software Layer</text>
        <rect x="40" y="60" width="180" height="60" class="box soft"></rect>
        <text x="52" y="84" class="label">C.A.S.H. Web App</text>
        <text x="52" y="101" class="small">Next.js Dashboard</text>
        <rect x="240" y="60" width="170" height="90" class="box soft"></rect>
        <text x="252" y="84" class="label">API Endpoints</text>
        <text x="252" y="101" class="small">/api/deposit</text>
        <text x="252" y="118" class="small">/api/device/status</text>
        <path d="M220 90 L240 90" class="line2"></path>

        <rect x="20" y="230" width="410" height="240" class="group"></rect>
        <text x="35" y="254" class="title">Control Layer</text>
        <rect x="40" y="280" width="170" height="85" class="box ctrl"></rect>
        <text x="52" y="304" class="label">ESP32 Master</text>
        <text x="52" y="321" class="small">Motor 4 + sensors + API bridge</text>
        <rect x="240" y="280" width="170" height="85" class="box ctrl"></rect>
        <text x="252" y="304" class="label">Arduino Uno 1</text>
        <text x="252" y="321" class="small">Motor 1 to 3 controller</text>
        <path d="M210 320 L240 320" class="line2"></path>
        <text x="205" y="308" class="small">UART</text>
        <text x="205" y="340" class="small">(level shifted)</text>

        <rect x="20" y="490" width="410" height="170" class="group"></rect>
        <text x="35" y="514" class="title">Power Layer</text>
        <rect x="40" y="535" width="110" height="48" class="box power"></rect>
        <text x="58" y="564" class="label">12V Rail</text>
        <rect x="165" y="535" width="110" height="48" class="box power"></rect>
        <text x="186" y="564" class="label">5V Rail</text>
        <rect x="290" y="535" width="120" height="48" class="box power"></rect>
        <text x="305" y="564" class="label">3.3V Logic</text>
        <rect x="40" y="595" width="370" height="45" class="box gnd"></rect>
        <text x="160" y="622" class="label">Common Ground (Star Point)</text>

        <rect x="470" y="20" width="440" height="290" class="group"></rect>
        <text x="485" y="44" class="title">Deposit + Sensor Layer</text>
        <rect x="490" y="65" width="180" height="70" class="box sensor"></rect>
        <text x="502" y="90" class="label">Bill Acceptor</text>
        <text x="502" y="107" class="small">Pulse output -> ESP32 GPIO34</text>
        <rect x="700" y="65" width="190" height="70" class="box sensor"></rect>
        <text x="712" y="90" class="label">Coin Acceptor</text>
        <text x="712" y="107" class="small">Pulse output -> ESP32 GPIO35</text>

        <rect x="490" y="150" width="180" height="60" class="box sensor"></rect>
        <text x="502" y="174" class="label">IR4 Sensor</text>
        <text x="502" y="191" class="small">Motor 4 detect -> GPIO27</text>
        <rect x="700" y="150" width="190" height="60" class="box sensor"></rect>
        <text x="712" y="174" class="label">IR5 Sensor Array x5</text>
        <text x="712" y="191" class="small">GPIO32,33,25,26,4</text>

        <rect x="470" y="330" width="440" height="330" class="group"></rect>
        <text x="485" y="354" class="title">Dispense Layer (Coins)</text>

        <rect x="490" y="375" width="180" height="68" class="box disp"></rect>
        <text x="502" y="398" class="label">Motor 1 Dispenser</text>
        <text x="502" y="415" class="small">1 peso, ULN2003, IR1</text>
        <rect x="700" y="375" width="190" height="68" class="box disp"></rect>
        <text x="712" y="398" class="label">Motor 2 Dispenser</text>
        <text x="712" y="415" class="small">5 peso, ULN2003, IR2</text>

        <rect x="490" y="460" width="180" height="68" class="box disp"></rect>
        <text x="502" y="483" class="label">Motor 3 Dispenser</text>
        <text x="502" y="500" class="small">10 peso, ULN2003, IR3</text>
        <rect x="700" y="460" width="190" height="68" class="box disp"></rect>
        <text x="712" y="483" class="label">Motor 4 Dispenser</text>
        <text x="712" y="500" class="small">20 peso, ULN2003, IR4</text>

        <rect x="930" y="20" width="450" height="370" class="group"></rect>
        <text x="945" y="44" class="title">Actuation Layer (Servos)</text>
        <rect x="950" y="65" width="230" height="80" class="box act"></rect>
        <text x="962" y="90" class="label">PCA9685 Servo Driver</text>
        <text x="962" y="107" class="small">I2C from ESP32: GPIO21 SDA, GPIO22 SCL</text>

        <rect x="950" y="160" width="180" height="40" class="box act"></rect>
        <text x="962" y="185" class="small">CH0..CH4 Standard Servos</text>
        <rect x="950" y="210" width="180" height="40" class="box act"></rect>
        <text x="962" y="235" class="small">CH6 Elevator Servo</text>

        <rect x="930" y="410" width="450" height="250" class="group"></rect>
        <text x="945" y="434" class="title">Communications and Interfaces</text>
        <rect x="950" y="460" width="180" height="70" class="box"></rect>
        <text x="962" y="484" class="label">UART Link</text>
        <text x="962" y="501" class="small">ESP32 <-> Uno via level shifter</text>
        <rect x="1150" y="460" width="210" height="70" class="box"></rect>
        <text x="1162" y="484" class="label">Web Bridge</text>
        <text x="1162" y="501" class="small">ESP32 posts deposits to API</text>

        <path d="M430 320 L490 100" class="line"></path>
        <path d="M430 320 L490 180" class="line"></path>
        <path d="M430 320 L700 180" class="line"></path>
        <path d="M430 320 L490 409" class="line"></path>
        <path d="M430 320 L700 409" class="line"></path>
        <path d="M430 320 L490 494" class="line"></path>
        <path d="M210 320 L700 494" class="line"></path>

        <path d="M210 320 L950 500" class="line"></path>
        <path d="M210 320 L1150 500" class="line"></path>
        <path d="M220 90 L1150 500" class="line"></path>

        <path d="M95 583 L580 65" class="line"></path>
        <path d="M95 583 L795 65" class="line"></path>
        <path d="M220 583 L580 409" class="line"></path>
        <path d="M220 583 L795 409" class="line"></path>
        <path d="M220 583 L580 494" class="line"></path>
        <path d="M220 583 L795 494" class="line"></path>
        <path d="M220 583 L1020 100" class="line"></path>
        <path d="M350 583 L580 180" class="line"></path>
        <path d="M350 583 L795 180" class="line"></path>

        <path d="M60 620 L1320 620" class="gline"></path>
      </svg>
    </div>
    <div class="note">Note: This is a thesis system schematic. Use your pin map sheet for exact pin-to-pin wiring during assembly.</div>
  </div>
</body>
</html>
