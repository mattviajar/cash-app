<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATM Learning System – Schematic Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: Arial, sans-serif; }
  svg { display: block; }
  @media print {
    body { margin: 0; }
    svg { width: 100vw; height: auto; }
  }
</style>
</head>
<body>
<svg
  id="schematic"
  viewBox="0 0 1400 980"
  width="1400"
  height="980"
  xmlns="http://www.w3.org/2000/svg"
  style="background:#fff;"
>
<defs>
  <!-- Arrowhead -->
  <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 7 2.5, 0 5" fill="#222"/>
  </marker>
  <!-- Small arrowhead for signal lines -->
  <marker id="ahs" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
    <polygon points="0 0, 5 2, 0 4" fill="#444"/>
  </marker>
  <!-- GND symbol -->
  <symbol id="gnd" viewBox="-10 0 20 16">
    <line x1="0" y1="0" x2="0" y2="6" stroke="#222" stroke-width="1.5"/>
    <line x1="-8" y1="6" x2="8" y2="6" stroke="#222" stroke-width="1.5"/>
    <line x1="-5" y1="9" x2="5" y2="9" stroke="#222" stroke-width="1.5"/>
    <line x1="-2" y1="12" x2="2" y2="12" stroke="#222" stroke-width="1.5"/>
  </symbol>
  <!-- VCC symbol -->
  <symbol id="vcc" viewBox="-8 0 16 14">
    <line x1="0" y1="14" x2="0" y2="6" stroke="#222" stroke-width="1.5"/>
    <polygon points="0,0 -6,8 6,8" fill="none" stroke="#222" stroke-width="1.5"/>
  </symbol>
  <!-- 5V rail symbol -->
  <symbol id="v5" viewBox="-8 0 16 14">
    <line x1="0" y1="14" x2="0" y2="6" stroke="#c00" stroke-width="1.5"/>
    <polygon points="0,0 -6,8 6,8" fill="none" stroke="#c00" stroke-width="1.5"/>
  </symbol>
  <!-- Resistor (IEEE zigzag) -->
  <symbol id="res" viewBox="0 0 40 12">
    <polyline points="0,6 4,6 6,1 10,11 14,1 18,11 22,1 26,11 30,1 34,11 36,6 40,6"
      fill="none" stroke="#222" stroke-width="1.5"/>
  </symbol>
  <!-- Capacitor -->
  <symbol id="cap" viewBox="0 0 20 20">
    <line x1="10" y1="0" x2="10" y2="8" stroke="#222" stroke-width="1.5"/>
    <line x1="2"  y1="8" x2="18" y2="8" stroke="#222" stroke-width="2"/>
    <line x1="2"  y1="12" x2="18" y2="12" stroke="#222" stroke-width="2"/>
    <line x1="10" y1="12" x2="10" y2="20" stroke="#222" stroke-width="1.5"/>
  </symbol>
</defs>

═══════════════════════════════════════════════════════════ -->
<rect x="5" y="5" width="1390" height="970" fill="none" stroke="#222" stroke-width="2.5"/>
<!-- inner thin border -->
<rect x="12" y="12" width="1376" height="956" fill="none" stroke="#222" stroke-width="0.8"/>

</g>

═══════════════════════════════════════════════════════════ -->
<!-- IR sensor schematic symbol: LED + phototransistor side-by-side in a box -->
<g font-size="8" fill="#222">

  <!-- IR4 -->
  <rect x="400" y="470" width="200" height="50" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.3"/>

  <line x1="560" y1="480" x2="570" y2="480" stroke="#ca8a04" stroke-width="1"/>
  <polygon points="560,476 560,484 568,480" fill="none" stroke="#ca8a04" stroke-width="1"/>
  <!-- phototransistor symbol -->
  <line x1="575" y1="476" x2="575" y2="484" stroke="#ca8a04" stroke-width="1"/>
  <line x1="570" y1="480" x2="585" y2="480" stroke="#ca8a04" stroke-width="1"/>

  <line x1="500" y1="470" x2="500" y2="460" stroke="#222" stroke-width="1"/>
  <use href="#gnd" x="490" y="460" width="20" height="16"/>

  <!-- IR5-1 .. IR5-5 (compact) -->
